postgres:
  enabled: true
  url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/sensor_data_system}
  username: ${POSTGRES_USERNAME:postgres}
  password: ${POSTGRES_PASSWORD:change-me}

local:
  upload:
    path: ./uploads
    url: ${LOCAL_UPLOAD_URL:http://localhost:8123/api/file}
